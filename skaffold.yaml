apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: aidevops-platform

build:
  local:
    push: true
    concurrency: 4
  artifacts:
  - image: 10.10.10.240/library/backend
    docker:
      dockerfile: build/backend/Dockerfile
    context: .
  - image: 10.10.10.240/library/operator
    docker:
      dockerfile: build/operator/Dockerfile
    context: .
  - image: 10.10.10.240/library/gateway
    docker:
      dockerfile: build/gateway/Dockerfile
    context: .
  - image: 10.10.10.240/library/event-collector
    docker:
      dockerfile: build/event-collector/Dockerfile
    context: .
  - image: 10.10.10.240/library/control-panel-frontend
    docker:
      dockerfile: Dockerfile
    context: frontend
  - image: 10.10.10.240/library/agent-runtime
    docker:
      dockerfile: agent-runtime/Dockerfile
    context: .

deploy:
  helm:
    releases:
    - name: aidevops
      chartPath: k8s/helm
      namespace: aidevops
      createNamespace: true
      setValues:
        global.registry: "10.10.10.240/library"
        global.tag: dev
        global.imagePullPolicy: Always
        platformInit.image: "bitnami/kubectl:latest"
        agentRuntimeImage: "10.10.10.240/library/agent-runtime:latest"
        backend.port: "8081"
        ingress.enabled: "false"
        llm.apiKey: "sk-nTS4PVnmc24hYSCkAuYZSRY9aXcbfxHLQAJ9zrOpiovV3kvQ"
        llm.baseURL: "https://bobdong.cn/v1"
