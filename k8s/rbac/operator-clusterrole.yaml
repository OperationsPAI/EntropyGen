apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-operator
  namespace: control-plane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-operator-role
rules:
  # Management of agent CRD (core permissions)
  - apiGroups: ["aidevops.io"]
    resources: ["agents"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["aidevops.io"]
    resources: ["agents/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["aidevops.io"]
    resources: ["agents/finalizers"]
    verbs: ["update"]

  # Management of core resources in agents namespace
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "serviceaccounts", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Management of RBAC in agents namespace (bind roles to Agent Pods)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Read Pod status (for heartbeat detection and CrashLoop alerts)
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  # Write K8S Events (controller standard practice, visible via kubectl describe)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  # Leader Election (coordinate primary replica in multi-replica deployment)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-operator-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: devops-operator-role
subjects:
  - kind: ServiceAccount
    name: devops-operator
    namespace: control-plane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devops-operator-app-staging
  namespace: app-staging
rules:
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devops-operator-app-staging
  namespace: app-staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: devops-operator-app-staging
subjects:
  - kind: ServiceAccount
    name: devops-operator
    namespace: control-plane
