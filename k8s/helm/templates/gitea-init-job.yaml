apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "aidevops-platform.fullname" . }}-gitea-init
  namespace: {{ .Values.controlPlaneNamespace | default "control-plane" }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-delete-policy": hook-succeeded
    "helm.sh/hook-weight": "1"
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      name: gitea-init
      labels:
        app.kubernetes.io/component: gitea-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: gitea-init
          image: {{ include "aidevops-platform.image" (dict "registry" .Values.global.registry "name" "gitea-init" "tag" .Values.global.tag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          env:
            - name: GITEA_URL
              value: {{ .Values.gitea.addr | quote }}
            - name: GITEA_ORG
              value: "platform"
            - name: GITEA_REPO
              value: "platform-demo"
            - name: EVENT_COLLECTOR_URL
              value: "http://{{ include "aidevops-platform.fullname" . }}-event-collector.{{ .Values.controlPlaneNamespace | default "control-plane" }}.svc:{{ .Values.eventCollector.port }}/webhooks/gitea"
            - name: GITEA_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gitea.adminTokenSecretRef | default "gitea-admin-token" }}
                  key: token
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: gitea-webhook-secret
                  key: secret
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
