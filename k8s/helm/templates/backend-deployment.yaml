{{- /*
  Control Panel Backend: Deployment, ServiceAccount, ClusterRole, ClusterRoleBinding,
  PVC for Dead Letter Queue, and ClusterIP Service.
  Phase: 5 (Backend implementation)
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-panel-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: control-panel-backend-role
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
rules:
- apiGroups: ["aidevops.io"]
  resources: ["agents"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["aidevops.io"]
  resources: ["agents/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: control-panel-backend-rolebinding
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: control-panel-backend-role
subjects:
- kind: ServiceAccount
  name: control-panel-backend
  namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-dlq
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: {{ .Values.storage.className }}
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-panel-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
      {{- include "aidevops-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: backend
        {{- include "aidevops-platform.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: control-panel-backend
      initContainers:
        {{- include "aidevops-platform.wait-for-deps" (dict "deps" (list
          (dict "name" "redis"      "addr" .Values.redis.addr)
          (dict "name" "clickhouse" "addr" .Values.clickhouse.addr)
        )) | nindent 8 }}
      containers:
      - name: backend
        image: {{ include "aidevops-platform.image" (dict "registry" .Values.global.registry "name" .Values.backend.image "tag" .Values.global.tag) }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        ports:
        - containerPort: {{ .Values.backend.port }}
          name: http
          protocol: TCP
        env:
        - name: LISTEN_ADDR
          value: ":{{ .Values.backend.port }}"
        - name: CLICKHOUSE_ADDR
          value: {{ .Values.clickhouse.addr }}
        - name: CLICKHOUSE_DB
          value: {{ .Values.clickhouse.database }}
        - name: REDIS_ADDR
          value: {{ .Values.redis.addr }}
        - name: LITELLM_ADDR
          value: {{ .Values.litellm.addr }}
        - name: ADMIN_USERNAME
          value: {{ .Values.backend.adminUsername }}
        - name: ADMIN_PASSWORD_HASH
          valueFrom:
            secretKeyRef:
              name: backend-admin-secret
              key: password-hash
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.gateway.jwtSecretRef }}
              key: jwt-secret
        - name: AGENT_NAMESPACE
          value: {{ .Values.agentNamespace }}
        - name: DLQ_DIR
          value: /var/lib/backend/dlq
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
        volumeMounts:
        - name: dlq
          mountPath: /var/lib/backend/dlq
        livenessProbe:
          httpGet:
            path: /api/health
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 2
      volumes:
      - name: dlq
        persistentVolumeClaim:
          claimName: backend-dlq
---
apiVersion: v1
kind: Service
metadata:
  name: control-panel-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/component: backend
    {{- include "aidevops-platform.selectorLabels" . | nindent 4 }}
  ports:
  - name: http
    port: 80
    targetPort: {{ .Values.backend.port }}
    protocol: TCP
  type: ClusterIP
