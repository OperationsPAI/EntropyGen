{{- /*
  Control Panel Backend: Deployment, ServiceAccount, ClusterRole, ClusterRoleBinding,
  PVC for Dead Letter Queue, and ClusterIP Service.
  Phase: 5 (Backend implementation)
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-panel-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: control-panel-backend-role
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
rules:
- apiGroups: ["aidevops.io"]
  resources: ["agents"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["aidevops.io"]
  resources: ["agents/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: control-panel-backend-rolebinding
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: control-panel-backend-role
subjects:
- kind: ServiceAccount
  name: control-panel-backend
  namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-dlq
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: {{ .Values.storage.className }}
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: roles-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  accessModes: [ReadWriteMany]
  storageClassName: {{ .Values.storage.className }}
  resources:
    requests:
      storage: {{ .Values.storage.rolesData.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-panel-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
      {{- include "aidevops-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: backend
        {{- include "aidevops-platform.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: control-panel-backend
      initContainers:
        {{- include "aidevops-platform.wait-for-deps" (dict "deps" (list
          (dict "name" "redis"             "addr" .Values.redis.addr)
          (dict "name" "clickhouse"        "addr" .Values.clickhouse.addr)
          (dict "name" "gitea"             "addr" .Values.gitea.addr)
          (dict "name" "platform-postgres" "addr" (printf "%s:%d" .Values.postgres.host (.Values.postgres.port | int)))
        )) | nindent 8 }}
      containers:
      - name: backend
        image: {{ include "aidevops-platform.image" (dict "registry" .Values.global.registry "name" .Values.backend.image "tag" .Values.global.tag) }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        ports:
        - containerPort: {{ .Values.backend.port }}
          name: http
          protocol: TCP
        env:
        - name: LISTEN_ADDR
          value: ":{{ .Values.backend.port }}"
        - name: CLICKHOUSE_ADDR
          value: {{ .Values.clickhouse.addr }}
        - name: CLICKHOUSE_DB
          value: {{ .Values.clickhouse.database }}
        - name: REDIS_ADDR
          value: {{ .Values.redis.addr }}
        - name: LITELLM_ADDR
          value: {{ .Values.litellm.addr }}
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: platform-secrets
              key: litellm-master-key
        - name: ADMIN_USERNAME
          value: {{ .Values.backend.adminUsername }}
        - name: ADMIN_PASSWORD_HASH
          valueFrom:
            secretKeyRef:
              name: backend-admin-secret
              key: password-hash
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.gateway.jwtSecretRef }}
              key: jwt-secret
        - name: AGENT_NAMESPACE
          value: {{ .Values.agentNamespace }}
        - name: AGENT_RUNTIME_IMAGE
          value: {{ .Values.agentRuntimeImage }}
        - name: DLQ_DIR
          value: /var/lib/backend/dlq
        - name: GITEA_URL
          value: {{ .Values.gitea.addr }}
        - name: GITEA_EXTERNAL_URL
          value: {{ printf "http://%s" .Values.ingress.hosts.gitea }}
        - name: GITEA_ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.gitea.adminTokenSecretRef }}
              key: token
        - name: ROLES_DATA_PATH
          value: /data/roles
        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgres.secretRef }}
              key: password
        - name: DATABASE_URL
          value: "postgresql://{{ .Values.backend.postgres.user }}:$(PG_PASSWORD)@{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.backend.postgres.database }}"
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
        volumeMounts:
        - name: dlq
          mountPath: /var/lib/backend/dlq
        - name: roles-data
          mountPath: /data/roles
        livenessProbe:
          httpGet:
            path: /api/health
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 2
      volumes:
      - name: dlq
        persistentVolumeClaim:
          claimName: backend-dlq
      - name: roles-data
        persistentVolumeClaim:
          claimName: roles-data
---
apiVersion: v1
kind: Service
metadata:
  name: control-panel-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/component: backend
    {{- include "aidevops-platform.selectorLabels" . | nindent 4 }}
  ports:
  - name: http
    port: 80
    targetPort: {{ .Values.backend.port }}
    protocol: TCP
  type: ClusterIP
