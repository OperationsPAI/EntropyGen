{{- /* Infrastructure: Redis, ClickHouse, Gitea, PostgreSQL (LiteLLM) */ -}}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: {{ .Values.storage.className }}
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:8-alpine
        ports:
        - containerPort: 6379
        command: ["redis-server", "--appendonly", "yes", "--maxmemory", {{ .Values.redis.maxmemory | quote }}, "--maxmemory-policy", {{ .Values.redis.maxmemoryPolicy | quote }}]
        volumeMounts:
        - name: data
          mountPath: /data
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app: redis
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clickhouse-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: {{ .Values.storage.className }}
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app: clickhouse
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
      - name: clickhouse
        image: clickhouse/clickhouse-server:24-alpine
        ports:
        - containerPort: 8123
          name: http
        - containerPort: 9000
          name: native
        env:
        - name: CLICKHOUSE_DB
          value: {{ .Values.clickhouse.database }}
        - name: CLICKHOUSE_USER
          value: {{ .Values.clickhouse.username }}
        - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
          value: "1"
        volumeMounts:
        - name: data
          mountPath: /var/lib/clickhouse
        readinessProbe:
          httpGet:
            path: /ping
            port: 8123
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: clickhouse-data
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app: clickhouse
spec:
  selector:
    app: clickhouse
  ports:
  - name: http
    port: 8123
    targetPort: 8123
  - name: native
    port: 9000
    targetPort: 9000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gitea
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app: gitea
spec:
  serviceName: gitea
  replicas: 1
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      containers:
      - name: gitea
        image: gitea/gitea:1.25
        ports:
        - containerPort: 3000
          name: http
        - containerPort: 22
          name: ssh
        env:
        - name: USER_UID
          value: "1000"
        - name: USER_GID
          value: "1000"
        - name: GITEA__database__DB_TYPE
          value: sqlite3
        - name: GITEA__server__DOMAIN
          value: gitea.{{ .Release.Namespace }}.svc
        - name: GITEA__server__HTTP_PORT
          value: "3000"
        - name: GITEA__server__ROOT_URL
          value: http://gitea.{{ .Release.Namespace }}.svc:3000/
        - name: GITEA__security__INSTALL_LOCK
          value: "true"
        - name: GITEA__service__DISABLE_REGISTRATION
          value: "false"
        - name: GITEA__log__LEVEL
          value: warn
        - name: GITEA__security__SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: gitea-admin-creds
              key: secret-key
        - name: GITEA_ADMIN_USER
          value: gitea-admin
        - name: GITEA_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: gitea-admin-creds
              key: password
        - name: GITEA_ADMIN_EMAIL
          value: admin@devops.local
        volumeMounts:
        - name: data
          mountPath: /data
        readinessProbe:
          httpGet:
            path: /api/v1/version
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ReadWriteOnce]
      storageClassName: {{ .Values.storage.className }}
      resources:
        requests:
          storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app: gitea
spec:
  type: {{ .Values.gitea.serviceType }}
  selector:
    app: gitea
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    {{- if eq .Values.gitea.serviceType "NodePort" }}
    nodePort: {{ .Values.gitea.nodePort }}
    {{- end }}
  - name: ssh
    port: 22
    targetPort: 22
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: platform-postgres-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: {{ .Values.storage.className }}
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: platform-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app: platform-postgres
spec:
  serviceName: platform-postgres
  replicas: 1
  selector:
    matchLabels:
      app: platform-postgres
  template:
    metadata:
      labels:
        app: platform-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgres.secretRef }}
              key: password
        - name: POSTGRES_MULTIPLE_DATABASES
          value: "{{ .Values.litellm.postgres.database }},{{ .Values.backend.postgres.database }}"
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres"]
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: platform-postgres-data
      - name: init-scripts
        configMap:
          name: platform-postgres-init
          defaultMode: 0755
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-postgres-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
data:
  create-databases.sh: |
    #!/bin/bash
    set -e
    for db in $(echo "$POSTGRES_MULTIPLE_DATABASES" | tr ',' ' '); do
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<-EOSQL
        CREATE DATABASE "$db";
        CREATE USER "$db" WITH PASSWORD '$POSTGRES_PASSWORD';
        GRANT ALL PRIVILEGES ON DATABASE "$db" TO "$db";
    EOSQL
      echo "Database '$db' and user '$db' created."
    done
---
apiVersion: v1
kind: Service
metadata:
  name: platform-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app: platform-postgres
spec:
  selector:
    app: platform-postgres
  ports:
  - port: 5432
    targetPort: 5432
