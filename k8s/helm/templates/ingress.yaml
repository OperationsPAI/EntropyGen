# Ingress resources for platform entry points
# Hosts:
#   - control.devops.local -> Control Panel Frontend (port 80) + Backend API (/api/*)
#   - gitea.devops.local   -> Gitea Web UI
#   - app.devops.local     -> app-staging deployed applications
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: {{ .Values.ingress.ingressClassName }}
  rules:
  - host: {{ .Values.ingress.hosts.control }}
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: control-panel-backend
            port:
              name: http
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              name: http
  - host: {{ .Values.ingress.hosts.gitea }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gitea
            port:
              name: http
{{- end }}
