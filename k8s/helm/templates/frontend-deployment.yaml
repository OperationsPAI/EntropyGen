{{- /*
  Control Panel Frontend: Deployment and ClusterIP Service.
  Phase: 6 (Frontend implementation)
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-panel-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: frontend
      {{- include "aidevops-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: frontend
        {{- include "aidevops-platform.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: frontend
        image: {{ include "aidevops-platform.image" (dict "registry" .Values.global.registry "name" .Values.frontend.image "tag" .Values.global.tag) }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        resources:
          {{- toYaml .Values.frontend.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.serviceType }}
  selector:
    app.kubernetes.io/component: frontend
    {{- include "aidevops-platform.selectorLabels" . | nindent 4 }}
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
    {{- if eq .Values.frontend.serviceType "NodePort" }}
    nodePort: {{ .Values.frontend.nodePort }}
    {{- end }}
