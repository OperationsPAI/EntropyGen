{{- /*
  Agent Gateway Deployment and Service.
  Phase: 3 (Agent Gateway implementation)
  Provides: JWT auth, reverse proxy to LiteLLM/Gitea, audit event writing.
  Deployed with 2 replicas and RollingUpdate (maxUnavailable=0) for zero-downtime.
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: gateway
      {{- include "aidevops-platform.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/component: gateway
        {{- include "aidevops-platform.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        {{- include "aidevops-platform.wait-for-deps" (dict "deps" (list
          (dict "name" "redis" "addr" .Values.redis.addr)
        )) | nindent 8 }}
      containers:
      - name: gateway
        image: {{ include "aidevops-platform.image" (dict "registry" .Values.global.registry "name" .Values.gateway.image "tag" .Values.global.tag) }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        ports:
        - containerPort: {{ .Values.gateway.port }}
          name: http
          protocol: TCP
        env:
        - name: LISTEN_ADDR
          value: ":{{ .Values.gateway.port }}"
        - name: LITELLM_ADDR
          value: {{ .Values.litellm.addr }}
        - name: GITEA_ADDR
          value: {{ .Values.gitea.addr }}
        - name: REDIS_ADDR
          value: {{ .Values.redis.addr }}
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.gateway.jwtSecretRef }}
              key: jwt-secret
        resources:
          {{- toYaml .Values.gateway.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.gateway.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.gateway.port }}
          initialDelaySeconds: 3
          periodSeconds: 5
          failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: agent-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  selector:
    app.kubernetes.io/component: gateway
    {{- include "aidevops-platform.selectorLabels" . | nindent 4 }}
  ports:
  - name: http
    port: 80
    targetPort: {{ .Values.gateway.port }}
    protocol: TCP
    {{- if eq .Values.gateway.serviceType "NodePort" }}
    nodePort: {{ .Values.gateway.nodePort }}
    {{- end }}
  type: {{ .Values.gateway.serviceType }}
