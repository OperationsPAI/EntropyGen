{{- /*
  Operator (devops-operator) Deployment and ServiceAccount.
  ClusterRole + ClusterRoleBinding are in rbac.yaml.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: operator
      {{- include "aidevops-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: operator
        {{- include "aidevops-platform.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: devops-operator
      initContainers:
        {{- include "aidevops-platform.wait-for-deps" (dict "deps" (list
          (dict "name" "redis" "addr" .Values.redis.addr)
          (dict "name" "gitea" "addr" .Values.gitea.addr)
        )) | nindent 8 }}
      containers:
      - name: operator
        image: {{ include "aidevops-platform.image" (dict "registry" .Values.global.registry "name" .Values.operator.image "tag" .Values.global.tag) }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        command: ["/operator"]
        env:
        - name: GITEA_URL
          value: {{ .Values.gitea.addr }}
        - name: GITEA_ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.gitea.adminTokenSecretRef }}
              key: token
        - name: JWT_SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.gateway.jwtSecretRef }}
              key: jwt-secret
        - name: AGENT_NAMESPACE
          value: {{ .Values.agentNamespace }}
        - name: REDIS_ADDR
          value: {{ .Values.redis.addr }}
        - name: AGENT_RUNTIME_IMAGE
          value: {{ .Values.agentRuntimeImage }}
        - name: CONTROL_PLANE_NAMESPACE
          value: {{ .Release.Namespace }}
        - name: GATEWAY_URL
          value: "http://agent-gateway.{{ .Release.Namespace }}.svc:80"
        - name: DEFAULT_STORAGE_CLASS
          value: {{ .Values.storage.className }}
        - name: ROLES_DATA_PATH
          value: /data/roles
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: platform-secrets
              key: litellm-master-key
        - name: LLM_BASE_URL
          value: "http://litellm.{{ .Release.Namespace }}.svc:4000/v1"
        resources:
          {{- toYaml .Values.operator.resources | nindent 10 }}
        volumeMounts:
        - name: roles-data
          mountPath: /data/roles
          readOnly: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.operator.healthPort }}
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: {{ .Values.operator.healthPort }}
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: roles-data
        persistentVolumeClaim:
          claimName: roles-data
          readOnly: true
