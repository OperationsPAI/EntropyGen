{{- /*
  Operator (devops-operator) Deployment and ServiceAccount.
  ClusterRole is applied separately from k8s/rbac/operator-clusterrole.yaml.
  Phase: 2 (Operator implementation)
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-operator-rolebinding
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: devops-operator-role
subjects:
- kind: ServiceAccount
  name: devops-operator
  namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: operator
      {{- include "aidevops-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: operator
        {{- include "aidevops-platform.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: devops-operator
      containers:
      - name: operator
        image: {{ include "aidevops-platform.image" (dict "registry" .Values.global.registry "name" .Values.operator.image "tag" .Values.global.tag) }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        command: ["/operator"]
        env:
        - name: GITEA_URL
          value: {{ .Values.gitea.addr }}
        - name: GITEA_ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.gitea.adminTokenSecretRef }}
              key: token
        - name: JWT_SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.gateway.jwtSecretRef }}
              key: jwt-secret
        - name: AGENT_NAMESPACE
          value: {{ .Values.agentNamespace }}
        - name: REDIS_ADDR
          value: {{ .Values.redis.addr }}
        - name: CONTROL_PLANE_NAMESPACE
          value: {{ .Release.Namespace }}
        resources:
          {{- toYaml .Values.operator.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
