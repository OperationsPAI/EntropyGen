{{- /* Only create the namespace if it differs from the release namespace,
       because Helm/Skaffold already creates the release namespace via createNamespace. */ -}}
{{- if ne .Values.agentNamespace .Release.Namespace }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.agentNamespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
    purpose: agent-runtime
{{- end }}
