{{- /*
  Platform secrets.
  Uses lookup() to preserve existing values on upgrade.
  On first install, generates random values instead of insecure defaults.
*/ -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace "backend-admin-secret" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-admin-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  password-hash: {{ if $existing }}{{ index $existing.data "password-hash" | b64dec | quote }}{{ else }}{{ .Values.backend.adminPasswordHash | default "$2a$10$pUQzGZFY0DvC1GfO.RYjmeX79uXUL7mqYruyEwVjGzp4RdtGWxgIe" | quote }}{{ end }}
{{- $existingGiteaToken := lookup "v1" "Secret" .Release.Namespace "gitea-admin-token" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-admin-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ if $existingGiteaToken }}{{ index $existingGiteaToken.data "token" | b64dec | quote }}{{ else }}"placeholder-replaced-by-bootstrap-job"{{ end }}
{{- $existingWebhook := lookup "v1" "Secret" .Release.Namespace "gitea-webhook-secret" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-webhook-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret: {{ if $existingWebhook }}{{ index $existingWebhook.data "secret" | b64dec | quote }}{{ else }}{{ randAlphaNum 32 | quote }}{{ end }}
{{- $existingJWT := lookup "v1" "Secret" .Release.Namespace "agent-gateway-jwt-secret" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: agent-gateway-jwt-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ if $existingJWT }}{{ index $existingJWT.data "jwt-secret" | b64dec | quote }}{{ else }}{{ randAlphaNum 64 | quote }}{{ end }}
{{- $existingPlatform := lookup "v1" "Secret" .Release.Namespace "platform-secrets" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  litellm-master-key: {{ if $existingPlatform }}{{ index $existingPlatform.data "litellm-master-key" | b64dec | quote }}{{ else }}{{ .Values.llm.apiKey | default (randAlphaNum 32) | quote }}{{ end }}
{{- $existingGiteaCreds := lookup "v1" "Secret" .Release.Namespace "gitea-admin-creds" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-admin-creds
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ if $existingGiteaCreds }}{{ index $existingGiteaCreds.data "password" | b64dec | quote }}{{ else }}{{ .Values.gitea.adminPassword | quote }}{{ end }}
  secret-key: {{ if $existingGiteaCreds }}{{ index $existingGiteaCreds.data "secret-key" | b64dec | quote }}{{ else }}{{ randAlphaNum 32 | quote }}{{ end }}
{{- $existingPG := lookup "v1" "Secret" .Release.Namespace "platform-postgres-secret" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-postgres-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aidevops-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ if $existingPG }}{{ index $existingPG.data "password" | b64dec | quote }}{{ else }}{{ randAlphaNum 24 | quote }}{{ end }}
