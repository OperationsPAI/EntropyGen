global:
  registry: registry.devops.local/platform
  tag: latest
  imagePullPolicy: IfNotPresent

operator:
  replicas: 1
  image: operator
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

gateway:
  replicas: 2
  image: gateway
  jwtSecretRef: agent-gateway-jwt-secret
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

backend:
  replicas: 1
  image: backend
  adminUsername: admin
  port: 8081
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

eventCollector:
  replicas: 1
  image: event-collector
  port: 8082
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

frontend:
  replicas: 1
  image: control-panel-frontend
  port: 3000
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

redis:
  addr: redis.storage.svc:6379
  maxmemory: 512mb
  maxmemoryPolicy: allkeys-lru

clickhouse:
  addr: clickhouse.storage.svc:9000
  database: audit
  username: default

litellm:
  addr: http://litellm.llm-gateway.svc:4000

gitea:
  addr: http://gitea.devops-infra.svc:3000
  adminTokenSecretRef: gitea-admin-token

agentNamespace: agents
controlPlaneNamespace: control-plane

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    control: control.devops.local
    gitea: gitea.devops.local
    app: app.devops.local
