# Developer Agent — runtime configuration only
# Role content (SOUL.md, PROMPT.md, AGENTS.md, skills) lives in role-developer ConfigMap
apiVersion: aidevops.io/v1alpha1
kind: Agent
metadata:
  name: dev-test
  namespace: aidevops
spec:
  role: developer
  soul: ""
  cron:
    schedule: "*/3 * * * *"
  llm:
    model: qwen3.5-plus
    temperature: 0.7
    maxTokens: 65536
  gitea:
    permissions:
      - read
      - write
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "5000m"
      memory: "2Gi"
  memory:
    storageSize: "5Gi"
  paused: false
