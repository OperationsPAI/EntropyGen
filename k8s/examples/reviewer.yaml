# Reviewer Agent — runtime configuration only
# Role content (SOUL.md, PROMPT.md, AGENTS.md, skills) lives in role-reviewer ConfigMap
apiVersion: aidevops.io/v1alpha1
kind: Agent
metadata:
  name: rev-test
  namespace: aidevops
spec:
  role: reviewer
  soul: ""
  cron:
    schedule: "*/3 * * * *"
  llm:
    model: qwen3.5-plus
    temperature: 0.3
    maxTokens: 4096
  gitea:
    permissions:
      - read
      - review
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  memory:
    storageSize: "5Gi"
  paused: false
